name: Build Goblith APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > ~/.android/debug.keystore
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep SHA1

      - name: Download MuPDF AAR
        run: |
          mkdir -p app/libs
          curl -L "https://mupdf.com/downloads/archive/mupdf-1.23.7-android-fitz.aar" -o app/libs/mupdf-fitz.aar ||           curl -L "https://github.com/ArtifexSoftware/mupdf-android-fitz/releases/download/1.23.7/mupdf-android-fitz-release.aar" -o app/libs/mupdf-fitz.aar ||           curl -L "https://www.mupdf.com/downloads/archive/mupdf-1.23.7-android-fitz.aar" -o app/libs/mupdf-fitz.aar
          ls -lh app/libs/

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goblith-debug
          path: app/build/outputs/apk/debug/app-debug.apk
