name: Build Goblith APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > ~/.android/debug.keystore
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep SHA1

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Sign APK
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256             -keystore ~/.android/debug.keystore             -storepass android -keypass android             app/build/outputs/apk/debug/app-debug.apk androiddebugkey

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goblith-debug
          path: app/build/outputs/apk/debug/app-debug.apk
